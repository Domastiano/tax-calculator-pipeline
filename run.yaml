apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: tax-calculator-pipeline-run
spec:
  pipelineRef:
    name: tax-calculator-pipeline
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: tax-calculator-pvc
  params:
    - name: repo-url
      value: https://github.com/YOUR_USERNAME/tax-calculator.git
    - name: branch
      value: main
    - name: app-name
      value: tax-calculator
